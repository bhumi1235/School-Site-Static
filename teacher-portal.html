<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Teacher Portal - Evergreen International School</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    
    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        :root {
            --portal-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --teacher-accent: #d97706;
            --teacher-accent-glow: rgba(217, 119, 6, 0.3);
        }

        body {
            background: var(--portal-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        .portal-wrapper {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .portal-header i {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--teacher-accent-glow));
        }

        .portal-header h2 {
            color: #fff !important;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .portal-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), #d97706);
        }

        .form-label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control-portal {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 14px 18px;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control-portal:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
            outline: none;
        }

        .btn-teacher-login {
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%) !important;
            border: none !important;
            padding: 16px !important;
            border-radius: 14px !important;
            font-weight: 700 !important;
            letter-spacing: 1px !important;
            color: #fff !important;
            box-shadow: 0 12px 24px -8px rgba(217, 119, 6, 0.5) !important;
            transition: all 0.3s ease !important;
            margin-top: 10px;
        }

        .btn-teacher-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(217, 119, 6, 0.6) !important;
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .back-link:hover {
            color: #fff;
            transform: translateX(-5px);
        }

        .input-group-text {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 14px 0 0 14px;
        }

        .form-control-portal.has-icon {
            border-radius: 0 14px 14px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .teacher-stamp {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: rgba(245, 158, 11, 0.1);
            transform: rotate(15deg);
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">
        <i class="fa fa-arrow-left me-2"></i> Exit Portal
    </a>

    <!-- Spinner -->
    <div id="spinner" class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center" style="z-index: 10000; background: #0f172a !important;">
        <div class="spinner-grow text-accent" role="status"></div>
    </div>

    <div class="portal-wrapper">
        <div class="portal-header">
            <i class="fa fa-chalkboard-teacher"></i>
            <h2>Faculty Entrance</h2>
            <p>Evergreen International School ERP System</p>
        </div>

        <div class="portal-card">
            <div class="teacher-stamp"><i class="fa fa-certificate"></i></div>
            
            <form id="teacherLoginForm">
                <div class="mb-4">
                    <label class="form-label">Employee ID / Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-user-tie"></i></span>
                        <input type="email" class="form-control-portal has-icon w-100" placeholder="teacher@school.com" value="teacher@school.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Security Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa fa-lock"></i></span>
                        <input type="password" class="form-control-portal has-icon w-100" placeholder="••••••••" value="teacher123" required>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remTeacher">
                        <label class="form-check-label small text-white-50" for="remTeacher">Keep me logged in</label>
                    </div>
                    <a href="#" class="small text-accent text-decoration-none">Reset Password</a>
                </div>
                <button type="submit" class="btn btn-teacher-login w-100">Access ERP Dashboard</button>
            </form>

            <div class="text-center mt-5">
                <p class="small text-white-50">Authorized Faculty Only. <br>Need help? <a href="contact.html" class="text-white text-decoration-underline">IT Dept</a></p>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <p class="small text-white-50">&copy; 2026 EIS ERP System v4.2.0</p>
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(window).on('load', function () {
            $('#spinner').removeClass('show');
            setTimeout(function() {
                $('#spinner').addClass('d-none');
            }, 500);
        });

        $(document).ready(function() {
            $('#teacherLoginForm').on('submit', function(e) {
                e.preventDefault();
                const $btn = $(this).find('button');
                
                $btn.html('<i class="fa fa-spinner fa-spin me-2"></i>Accessing Portal...').addClass('disabled');
                
                // Redirect to the new teacher dashboard
                setTimeout(() => {
                    window.location.href = 'teacher-dashboard.html';
                }, 800);
            });
        });
    </script>
</body>

</html>
